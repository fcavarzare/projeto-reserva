<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Cinema Reserva</title>
    <style>
        :root { --primary: #e50914; --bg: #141414; --card: #1f1f1f; --text: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 40px; border-radius: 8px; width: 100%; max-width: 500px; margin-top: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--primary); }
        .profile-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .avatar-preview { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; margin-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 12px; border-radius: 4px; border: 1px solid #333; background: #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #b20710; }
        .back-btn { background: transparent; border: 1px solid #555; margin-top: 20px; }
        .message { margin-top: 15px; text-align: center; font-size: 0.9em; }
        .success { color: #46d369; }
        .error { color: #e50914; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Meu Perfil</h2>
        
        <div class="profile-header">
            <img id="avatarImg" src="https://www.w3schools.com/howto/img_avatar.png" alt="Avatar" class="avatar-preview">
            <span id="usernameDisplay" style="font-size: 1.2em; font-weight: bold;">Carregando...</span>
        </div>

        <form id="profileForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>URL do Avatar</label>
                <input type="text" id="avatarUrl" placeholder="https://link-da-imagem.jpg">
            </div>
            <button type="submit">Salvar Alterações</button>
        </form>

        <hr style="border: 0; border-top: 1px solid #333; margin: 30px 0;">

        <h3>Mudar Senha</h3>
        <form id="passwordForm">
            <div class="form-group">
                <label>Senha Atual</label>
                <input type="password" id="oldPassword" required>
            </div>
            <div class="form-group">
                <label>Nova Senha</label>
                <input type="password" id="newPassword" required>
            </div>
            <button type="submit" style="background: #333;">Alterar Senha</button>
        </form>

        <button class="back-btn" onclick="location.href='dashboard.html'">Voltar ao Dashboard</button>
        <div id="msg" class="message"></div>
    </div>

    <script>
        const API_URL = '/api/identity/profile'; // Através do Gateway
        const token = localStorage.getItem('token');

        if (!token) location.href = 'index.html';

        async function loadProfile() {
            const res = await fetch(API_URL, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const user = await res.json();
                document.getElementById('usernameDisplay').innerText = user.username;
                document.getElementById('email').value = user.email || '';
                document.getElementById('avatarUrl').value = user.avatarUrl || '';
                if (user.avatarUrl) document.getElementById('avatarImg').src = user.avatarUrl;
            }
        }

        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            const res = await fetch(API_URL, {
                method: 'PUT',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    avatarUrl: document.getElementById('avatarUrl').value
                })
            });

            if (res.ok) {
                msg.innerHTML = '<span class="success">Perfil atualizado!</span>';
                document.getElementById('avatarImg').src = document.getElementById('avatarUrl').value || 'https://www.w3schools.com/howto/img_avatar.png';
            } else {
                msg.innerHTML = '<span class="error">Erro ao atualizar perfil.</span>';
            }
        };

        document.getElementById('passwordForm').onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            const res = await fetch(`${API_URL}/change-password`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    oldPassword: document.getElementById('oldPassword').value,
                    newPassword: document.getElementById('newPassword').value
                })
            });

            if (res.ok) {
                msg.innerHTML = '<span class="success">Senha alterada com sucesso!</span>';
                e.target.reset();
            } else {
                const data = await res.json();
                msg.innerHTML = `<span class="error">${data.message || 'Erro ao alterar senha.'}</span>`;
            }
        };

        loadProfile();
    </script>
</body>
</html>
