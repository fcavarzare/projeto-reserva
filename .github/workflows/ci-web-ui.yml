name: ci-web-ui

on:
  push:
    branches: ["main"]
    paths:
      - "src/Web/**"

env:
  IMAGE_NAME: fcavarzare/projeto-reserva

jobs:
  build_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:web-ui-latest
            ${{ env.IMAGE_NAME }}:web-ui-${{ github.sha }}
