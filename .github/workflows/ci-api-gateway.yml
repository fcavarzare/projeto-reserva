name: CI - API Gateway

on:
  push:
    branches: [ main ]
    paths:
      - 'src/ApiGateway/**'
      - '.github/workflows/ci-api-gateway.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push
      run: |
        docker build -t fcavarzare/projeto-reserva:api-gateway-latest -f src/ApiGateway/Dockerfile src/
        docker push fcavarzare/projeto-reserva:api-gateway-latest
